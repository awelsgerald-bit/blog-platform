{% extends 'base.html' %}
{% block title %}Sign Up — BlogX{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-title">Join BlogX</div>
        <p class="form-subtitle">Create your account today</p>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-full">Create Account</button>
        </form>
        <div class="form-link">Already have an account? <a href="/login">Sign in</a></div>
    </div>
</div>
{% endblock %}
