{% extends 'base.html' %}
{% block title %}New Post{% endblock %}
{% block content %}
<div class="feed-header" style="display:flex; align-items:center; gap:16px;">
    <a href="/" style="color:var(--text); text-decoration:none; font-size:1.2rem;">←</a>
    <h1>New Post</h1>
</div>
<div style="padding:20px;">
    <form method="POST">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" placeholder="Give your post a title..." required>
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea name="content" placeholder="What's on your mind?" required></textarea>
        </div>
        <div class="form-group">
            <label>Categories (hold Ctrl to select multiple)</label>
            <select name="categories" multiple>
                {% for cat in categories %}
                <option value="{{ cat.id }}">{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="draft">💾 Save as Draft</option>
                <option value="published">🚀 Publish Now</option>
                <option value="scheduled">⏰ Schedule</option>
            </select>
        </div>
        <div class="form-group">
            <label>Schedule Date (if scheduled)</label>
            <input type="datetime-local" name="scheduled_at">
        </div>
        <button type="submit" class="btn-full">Post</button>
    </form>
</div>
{% endblock %}
