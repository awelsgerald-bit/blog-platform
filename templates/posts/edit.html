{% extends 'base.html' %}
{% block title %}Edit Post — The Chronicle{% endblock %}
{% block content %}
<div class="feed-header" style="display:flex; align-items:center; gap:16px;">
  <a href="/post/{{ post.slug }}" style="color:var(--text); text-decoration:none; font-size:1.3rem; line-height:1;">←</a>
  <div class="feed-title">Edit Post</div>
</div>
<div style="padding:24px 20px;">
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label>Title</label>
      <input type="text" name="title" value="{{ post.title }}" required>
    </div>
    <div class="form-group">
      <label>Content</label>
      <textarea name="content" required style="min-height:240px;">{{ post.content }}</textarea>
    </div>
    <div class="form-group">
      <label>Cover Image (optional)</label>
      {% if post.image %}
      <img src="/static/{{ post.image }}" style="width:100%; max-height:200px; object-fit:cover; border-radius:10px; margin-bottom:10px; border:1px solid var(--border);">
      {% endif %}
      <input type="file" name="image" accept="image/*" style="padding:10px;">
    </div>
    <div class="form-group">
      <label>Categories</label>
      <select name="categories" multiple>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {% if cat in post.categories %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
      <div class="form-group">
        <label>Status</label>
        <select name="status" style="min-height:auto;">
          <option value="draft" {% if post.status=='draft' %}selected{% endif %}>💾 Draft</option>
          <option value="published" {% if post.status=='published' %}selected{% endif %}>🚀 Published</option>
          <option value="scheduled" {% if post.status=='scheduled' %}selected{% endif %}>⏰ Scheduled</option>
        </select>
      </div>
      <div class="form-group">
        <label>Schedule Date</label>
        <input type="datetime-local" name="scheduled_at" style="min-height:auto;" value="{{ post.scheduled_at.strftime('%Y-%m-%dT%H:%M') if post.scheduled_at }}">
      </div>
    </div>
    <div style="display:flex; gap:12px; margin-top:8px;">
      <button type="submit" class="btn btn-solid" style="padding:13px 32px; font-size:0.95rem;">Save Changes</button>
      <a href="/post/{{ post.slug }}" class="btn" style="padding:13px 32px; font-size:0.95rem;">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
