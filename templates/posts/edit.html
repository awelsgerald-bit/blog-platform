{% extends 'base.html' %}
{% block title %}Edit Post{% endblock %}
{% block content %}
<div class="feed-header" style="display:flex; align-items:center; gap:16px;">
    <a href="/post/{{ post.slug }}" style="color:var(--text); text-decoration:none; font-size:1.2rem;">←</a>
    <h1>Edit Post</h1>
</div>
<div style="padding:20px;">
    <form method="POST">
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ post.title }}" required>
        </div>
        <div class="form-group">
            <label>Content</label>
            <textarea name="content" required>{{ post.content }}</textarea>
        </div>
        <div class="form-group">
            <label>Categories</label>
            <select name="categories" multiple>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if cat in post.categories %}selected{% endif %}>{{ cat.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select name="status">
                <option value="draft" {% if post.status=='draft' %}selected{% endif %}>💾 Draft</option>
                <option value="published" {% if post.status=='published' %}selected{% endif %}>🚀 Published</option>
                <option value="scheduled" {% if post.status=='scheduled' %}selected{% endif %}>⏰ Scheduled</option>
            </select>
        </div>
        <div class="form-group">
            <label>Schedule Date</label>
            <input type="datetime-local" name="scheduled_at" value="{{ post.scheduled_at.strftime('%Y-%m-%dT%H:%M') if post.scheduled_at }}">
        </div>
        <button type="submit" class="btn-full">Save Changes</button>
    </form>
</div>
{% endblock %}
